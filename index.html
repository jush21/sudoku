<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Cache-Busting Meta Tags -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Sudoku Pro (STABLE)</title>
    
    <!-- Versioned CSS to force refresh -->
    <link rel="stylesheet" href="css/styles.css?v=1.0.1">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        // SERVICE WORKER KILLER (Fixes the "Ghost Version" bug)
        // This script runs immediately and unregisters any old saved versions
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        // Force-clear any old application cache
        if (window.caches) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
</head>
<body class="home-bg">
    <div class="container">
        <!-- Home Screen -->
        <div id="home-screen" class="screen">
            <h1>Sudoku</h1>
            <p>Pick a challenge (STABLE)</p>
            <div class="menu-buttons">
                <button class="menu-btn easy" onclick="startGame('easy')">Easy</button>
                <button class="menu-btn medium" onclick="startGame('medium')">Medium</button>
                <button class="menu-btn hard" onclick="startGame('hard')">Hard</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="game-header">
                <button class="back-btn" onclick="showHome()">← Back</button>
                <div class="game-info">
                    <span id="difficulty-label">Easy</span>
                </div>
            </div>
            
            <div id="sudoku-grid" class="grid"></div>

            <div class="number-pad">
                <button onclick="inputNumber(1)">1</button>
                <button onclick="inputNumber(2)">2</button>
                <button onclick="inputNumber(3)">3</button>
                <button onclick="inputNumber(4)">4</button>
                <button onclick="inputNumber(5)">5</button>
                <button onclick="inputNumber(6)">6</button>
                <button onclick="inputNumber(7)">7</button>
                <button onclick="inputNumber(8)">8</button>
                <button onclick="inputNumber(9)">9</button>
                <button onclick="inputNumber(0)">⌫</button>
            </div>
        </div>
    </div>

    <!-- Versioned JS to force refresh -->
    <script src="js/sudoku.js?v=1.0.1"></script>
    <script src="js/ui.js?v=1.0.1"></script>
</body>
</html>
